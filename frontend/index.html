<!DOCTYPE html>
<html>

<head>
    <title>DP07 Analytics Dashboard</title>

    <link rel="stylesheet"
          href="https://cdn3.devexpress.com/jslib/25.1.3/css/dx.light.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn3.devexpress.com/jslib/25.1.3/js/dx.all.js"></script>

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <div class="top-row">

        <div class="panel">
            <h2>Correlation Logs</h2>
            <div id="correlationGrid"></div>
        </div>

        <div class="panel">
            <h2>Operation</h2>
            <div id="operationChart"></div>

    <div class="bottom-row">

        <div class="panel">
            <h2>Transaction Logs</h2>
            <div id="transactionGrid"></div>
        </div>

    </div>

    <script src="/js/dashboard.js"></script>

</html>
